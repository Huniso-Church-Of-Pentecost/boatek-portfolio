<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Foster / Boatek Labs</title>
<meta name="description" content="Notes on web development, AI integration, and building for clients — from Foster at Boatek Labs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/features.css">
<link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
<script src="js/theme-init.js"></script>
<style>
  .blog-wrap { max-width: 760px; margin: 0 auto; padding: 140px 20px 100px; }
  .blog-back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-tertiary); font-size: 13.5px; margin-bottom: 32px; }
  .blog-back:hover { color: var(--teal); }
  .blog-list-item { padding: 26px 0; border-bottom: 1px solid var(--surface-border); }
  .blog-list-item:first-child { padding-top: 0; }
  .blog-list-item h2 { font-size: 21px; margin: 0 0 8px; }
  .blog-list-item h2 a { color: var(--text); }
  .blog-list-item h2 a:hover { color: var(--teal); }
  .blog-list-item .blog-meta { font-size: 12.5px; color: var(--text-tertiary); margin-bottom: 10px; }
  .blog-list-item p { color: var(--text-secondary); font-size: 14.5px; line-height: 1.6; margin: 0; }
  .blog-post-title { font-size: 32px; margin: 0 0 12px; }
  .blog-post-body { font-size: 15.5px; line-height: 1.8; color: var(--text-secondary); }
  .blog-post-body p { margin: 0 0 18px; }
  .blog-empty { color: var(--text-tertiary); font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<div class="blog-wrap" id="blogRoot">
  <a href="index.html" class="blog-back"><i class="fa-solid fa-arrow-left"></i> Back to portfolio</a>
  <div id="blogContent">Loading…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>
<script src="js/blog.js" defer></script>
</body>
</html>
