<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Foster</title>
  <style>
    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070b14;
      color: #f2f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 380px; }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { color: #8b93a7; font-size: 15px; line-height: 1.6; margin: 0 0 24px; }
    button {
      background: linear-gradient(135deg, #3b6fe0, #2dd4bf);
      color: #04070d;
      border: none;
      padding: 13px 28px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>You're offline</h1>
    <p>This page isn't available without a connection. Once you're back online, it'll load automatically.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
